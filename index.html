<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diafon Kontrol Merkezi</title>
    <!-- jQuery Motoru kanka, CSS kullanmadan her şeyi bununla canlandıracağız -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

    <div id="admin-kutusu">
        <h2>⚡ DIAFON CONTROL PANEL</h2>
        <hr>

        <div class="satir">
            <span class="metin">ESP8266 Modülü:</span>
            <button id="btn-esp" class="anahtar">Yükleniyor...</button>
        </div>

        <div class="satir">
            <span class="metin">Android Java Servisi:</span>
            <button id="btn-android" class="anahtar">Yükleniyor...</button>
        </div>

        <hr>
        <div id="durum-bar">
            <strong>Durum:</strong> <span id="durum-yazi">Sistem hazır kanka.</span>
        </div>
    </div>

    <script>
        $(document).ready(function() {
    // ==========================================
    // 🎛️ TELEGRAM AYARLARI (CİHAN DIAFON KONTROL)
    // ==========================================
    var botToken = "8822982581:AAFPn5rSjyXu2XcHkPnV7W2rUzLijYBTNPA";
    var chatId = "8481437790";

    // Telegram API'sine arka planda istek atan ortak fonksiyonumuz
    function telegramMesajGonder(mesaj) {
        var url = `https://api.telegram.org/bot${botToken}/sendMessage`;
        
        // jQuery GET isteği ile Telegram sunucularına sinyal fırlatıyoruz
        $.get(url, {
            chat_id: chatId,
            text: mesaj
        })
        .done(function(response) {
            console.log("Sinyal Telegram'a uçtu kanka:", response);
            // Sayfanın en altındaki durum barını yeşile boyayıp onay veriyoruz
            $("#durum-bar").text("Telegram'a işlendi!").css("color", "#00ff00");
        })
        .fail(function(error) {
            console.error("Hata oluştu kanka:", error);
            // Sinyal gitmezse durum barını kırmızı yapıp uyarıyoruz
            $("#durum-bar").text("Hata: Sinyal gitmedi!").css("color", "#ff0000");
        });
    }

    // ==========================================
    // ⚡ BUTON TETİKLEMELERİ VE DİNAMİK STİLLER
    // ==========================================

    // 1. ESP8266 Modülü Kontrol Butonu
    $("#esp-buton").click(function() {
        if ($(this).hasClass("aktif")) {
            // Buton AÇIK'tı, şimdi KAPALI yapıyoruz
            $(this).removeClass("aktif").addClass("pasif").text("KAPALI");
            telegramMesajGonder("Mesa komut:ESP pasif");
        } else {
            // Buton KAPALI'ydı, şimdi AÇIK yapıyoruz
            $(this).removeClass("pasif").addClass("aktif").text("AÇIK");
            telegramMesajGonder("Mesa komut:ESP aktif");
        }
    });

    // 2. Diafon Sinyal Kesici Kontrol Butonu
    $("#diafon-buton").click(function() {
        if ($(this).hasClass("aktif")) {
            $(this).removeClass("aktif").addClass("pasif").text("KAPALI");
            telegramMesajGonder("Mesa komut:Diafon pasif");
        } else {
            $(this).removeClass("pasif").addClass("aktif").text("AÇIK");
            telegramMesajGonder("Mesa komut:Diafon aktif");
        }
    });

    // 3. Otomatik Kapı Açıcı Kontrol Butonu
    $("#kapi-buton").click(function() {
        if ($(this).hasClass("aktif")) {
            $(this).removeClass("aktif").addClass("pasif").text("KAPALI");
            telegramMesajGonder("Mesa komut:Kapi pasif");
        } else {
            $(this).removeClass("pasif").addClass("aktif").text("AÇIK");
            telegramMesajGonder("Mesa komut:Kapi aktif");
        }
    });
});
    </script>
</body>
</html>
