<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cihan Diafon Paneli</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging-compat.js"></script>
</head>
<body>

    <div id="panel-container">
        <h1>CİHAN DIAFON KONTROL</h1>
        <hr class="cizgi">
        <div class="buton-satir"><span class="buton-etiket">ESP8266</span><button id="esp-buton" class="pasif">KAPALI</button></div>
        <div class="buton-satir"><span class="buton-etiket">Kesici</span><button id="diafon-buton" class="pasif">KAPALI</button></div>
        <div class="buton-satir"><span class="buton-etiket">Kapı</span><button id="kapi-buton" class="pasif">KAPALI</button></div>
        <hr class="cizgi">
        <div id="fcm-mesaj-icerik" style="background:#000; padding:10px; border-radius:8px;">Bekleniyor...</div>
        <div id="fcm-durum" style="font-size:11px; color:#ffaa00; margin-top:10px;">📡 FCM Bağlanıyor...</div>
    </div>
    <div id="supabase-log-ekrani">⚡ Sistem Hazır.</div>

    <script>
        const SUPABASE_URL = "https://tltekqwfkqaqlmmbzsmw.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_tEUn4TkI3Pc4zy8UwrqjIg_aplGStsz"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const cihazId = "cihan_merkez_diafon";
        const BOT_TOKEN = "7626992520:AAH8N5F6o_mP8G-o3eT17l5zXz6x86_N31Y";
        const CHAT_ID = "6365922752";

        // Telegram Fonksiyonu
        function telegramGonder(mesaj) {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(mesaj)}`)
            .then(() => $("#supabase-log-ekrani").text("✅ Telegram: " + mesaj))
            .catch(() => $("#supabase-log-ekrani").text("❌ Telegram Hatası!"));
        }

        // Supabase ve Telegram'ı tek seferde yönet
        async function guncelleVeBildir(col, val, ad) {
            const durum = val ? "AÇIK" : "KAPALI";
            // Supabase'i Güncelle
            await supabaseClient.from('diafon_kontrol').update({ [col]: val, son_mesaj: ad + ": " + durum }).eq('cihaz_id', cihazId);
            // Telegram'a Gönder
            telegramGonder(ad + " durumu: " + durum);
        }

        $(document).ready(function() {
            // Buton Olayları
            $("#esp-buton").click(() => guncelleVeBildir("esp_aktif", $("#esp-buton").hasClass("pasif"), "ESP"));
            $("#diafon-buton").click(() => guncelleVeBildir("kesici_aktif", $("#diafon-buton").hasClass("pasif"), "Diafon Kesici"));
            $("#kapi-buton").click(() => guncelleVeBildir("kapi_aktif", $("#kapi-buton").hasClass("pasif"), "Otomatik Kapı"));

            // Realtime Dinleme
            supabaseClient.channel('c').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'diafon_kontrol', filter: 'cihaz_id=eq.'+cihazId }, p => {
                const n = p.new;
                // Arayüzü Güncelle
                $("#esp-buton").attr('class', n.esp_aktif ? 'aktif' : 'pasif').text(n.esp_aktif ? "AÇIK" : "KAPALI");
                $("#diafon-buton").attr('class', n.kesici_aktif ? 'aktif' : 'pasif').text(n.kesici_aktif ? "AÇIK" : "KAPALI");
                $("#kapi-buton").attr('class', n.kapi_aktif ? 'aktif' : 'pasif').text(n.kapi_aktif ? "AÇIK" : "KAPALI");
                if(n.son_mesaj) $("#fcm-mesaj-icerik").text(n.son_mesaj);
            }).subscribe(s => $("#fcm-durum").text("📡 Realtime: " + s));
        });
    </script>
    <style>
        body { background: #0d0d0d; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #panel-container { background: #1a1a1a; padding: 20px; border-radius: 15px; width: 350px; text-align: center; }
        button { width: 100px; padding: 10px; cursor: pointer; border: none; }
        .aktif { background: #00ff00; color: black; }
        .pasif { background: #ff0033; color: white; }
        .buton-satir { margin: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</body>
</html>
