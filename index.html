<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cihan Diafon Otomasyon Paneli</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging-compat.js"></script>
</head>
<body>

    <div id="panel-container">
        <h1>CİHAN DIAFON KONTROL</h1>
        <hr class="cizgi">

        <div class="buton-satir">
            <span class="buton-etiket">ESP8266 Modülü</span>
            <button id="esp-buton" class="pasif">KAPALI</button>
        </div>
        <div class="buton-satir">
            <span class="buton-etiket">Diafon Sinyal Kesici</span>
            <button id="diafon-buton" class="pasif">KAPALI</button>
        </div>
        <div class="buton-satir">
            <span class="buton-etiket">Otomatik Kapı Açıcı</span>
            <button id="kapi-buton" class="pasif">KAPALI</button>
        </div>

        <hr class="cizgi">
        <div id="fcm-mesaj-alani">
            <div style="font-size:12px; color:#00ff00; margin-bottom:5px;">📨 SON MESAJ:</div>
            <div id="fcm-mesaj-icerik" style="background:#000; padding:12px; border-radius:8px; min-height:50px; border-left:4px solid #00ff00; text-align:left;">Bekleniyor...</div>
        </div>

        <hr class="cizgi">
        <div id="durum-bar">Sistem hazır kanka.</div>
        <div id="fcm-durum" style="font-size:11px; color:#ffaa00; margin-top:10px;">📡 Bağlantı kontrol ediliyor...</div>
    </div>

    <div id="supabase-log-ekrani">⚡ Supabase Hazır.</div>

    <script>
        // Ayarlar
        const firebaseConfig = {
            apiKey: "AIzaSyCs4s6f3bRhc8lotVWcEKSUAEH_OQFWR1g",
            authDomain: "diafon-tetik12.firebaseapp.com",
            projectId: "diafon-tetik12",
            storageBucket: "diafon-tetik12.firebasestorage.app",
            messagingSenderId: "534092717765",
            appId: "1:534092717765:web:695a90bde7071e207d1aac"
        };
        const VAPID_KEY = "BJcLJKf_jqJPoZxjSGFO4TjsxfDmk8Einp4e-XrruN2oIqKcMnBCmxqGuhHgRTPzItcog3eZDynrOu_76V0PqKI";

        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        // Service Worker'ı daha güvenli kaydet
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript,importScripts("https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js","https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging-compat.js");firebase.initializeApp(' + JSON.stringify(firebaseConfig) + ');const messaging=firebase.messaging();messaging.onBackgroundMessage((p)=>{self.registration.showNotification("📞 Cihan Diafon",{body:p.data?.mesaj||"Yeni mesaj var!"})});')
            .then(() => console.log('SW Başarıyla Kayıt Edildi.'))
            .catch(err => console.error('SW Hatası:', err));
        }

        // FCM Mesajlarını Yakala
        messaging.onMessage((payload) => {
            console.log("Mesaj geldi:", payload);
            const msg = payload.data?.mesaj || "Biri kapıda!";
            $("#fcm-mesaj-icerik").text(msg);
            $("#durum-bar").text("📨 " + msg);
        });

        async function requestFCMToken() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    const token = await messaging.getToken({ vapidKey: VAPID_KEY });
                    if (token) {
                        $("#fcm-durum").text("✅ FCM Aktif (Token Alındı)");
                        console.log("Token:", token);
                    }
                }
            } catch (e) { $("#fcm-durum").text("❌ FCM İzin Hatası"); }
        }

        $(document).ready(function() {
            // Görsel Stiller (Kanka kodun aynısı)
            $("body").css({ "background-color": "#0d0d0d", "color": "#ffffff", "font-family": "monospace", "display": "flex", "flex-direction": "column", "align-items": "center", "min-height": "100vh", "padding": "20px" });
            $("#panel-container").css({ "background-color": "#1a1a1a", "padding": "30px", "border-radius": "15px", "box-shadow": "0 0 25px #00ff00", "width": "100%", "max-width": "400px", "text-align": "center" });
            
            requestFCMToken();
        });
    </script>
</body>
</html>
