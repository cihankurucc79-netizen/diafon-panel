<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cihan Diafon Otomasyon Paneli</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging-compat.js"></script>
</head>
<body>

    <div id="panel-container">
        <h1>CİHAN DIAFON KONTROL</h1>
        <div class="buton-satir"><span class="buton-etiket">ESP8266 Modülü</span><button id="esp-buton" class="pasif">KAPALI</button></div>
        <div class="buton-satir"><span class="buton-etiket">Diafon Sinyal Kesici</span><button id="diafon-buton" class="pasif">KAPALI</button></div>
        <div class="buton-satir"><span class="buton-etiket">Otomatik Kapı Açıcı</span><button id="kapi-buton" class="pasif">KAPALI</button></div>
        <div id="fcm-mesaj-icerik" style="background:#000; padding:10px; margin-top:10px; border-left:4px solid #00ff00;">Bekleniyor...</div>
        <div id="durum-bar" style="margin-top:10px;">Sistem hazır kanka.</div>
        <div id="fcm-durum" style="font-size:11px; color:#ffaa00; margin-top:10px;">📡 FCM Bağlanıyor...</div>
    </div>
    <div id="supabase-log-ekrani" style="margin-top:20px;">⚡ Supabase Hazır.</div>

    <script>
        const SUPABASE_URL = "https://tltekqwfkqaqlmmbzsmw.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_tEUn4TkI3Pc4zy8UwrqjIg_aplGStsz"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const cihazId = "cihan_merkez_diafon";
        const TELEGRAM_BOT_TOKEN = "7626992520:AAH8N5F6o_mP8G-o3eT17l5zXz6x86_N31Y";
        const TELEGRAM_CHAT_ID = "6365922752";
        const firebaseConfig = {
            apiKey: "AIzaSyCs4s6f3bRhc8lotVWcEKSUAEH_OQFWR1g",
            authDomain: "diafon-tetik12.firebaseapp.com",
            projectId: "diafon-tetik12",
            storageBucket: "diafon-tetik12.firebasestorage.app",
            messagingSenderId: "534092717765",
            appId: "1:534092717765:web:695a90bde7071e207d1aac"
        };

        // --- GÖMÜLÜ FCM SERVICE WORKER ---
        const swCode = `
            importScripts('https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js');
            importScripts('https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging-compat.js');
            firebase.initializeApp(${JSON.stringify(firebaseConfig)});
            const messaging = firebase.messaging();
            messaging.onBackgroundMessage((p) => {
                self.registration.showNotification('📞 Cihan Diafon', { body: p.data?.mesaj || "Yeni mesaj!" });
            });
        `;
        const swUrl = URL.createObjectURL(new Blob([swCode], { type: 'application/javascript' }));

        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        function telegramGonder(msg) {
            fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage?chat_id=${TELEGRAM_CHAT_ID}&text=${encodeURIComponent(msg)}`);
        }

        async function supabaseGuncelle(col, val, ad) {
            const aktif = val ? "AÇIK" : "KAPALI";
            await supabaseClient.from('diafon_kontrol').update({ [col]: val, son_mesaj: ad + ": " + aktif }).eq('cihaz_id', cihazId);
            telegramGonder("📢 " + ad + " durumu: " + aktif);
        }

        $(document).ready(async function() {
            if ('serviceWorker' in navigator) navigator.serviceWorker.register(swUrl);
            
            // FCM İzin
            try {
                const p = await Notification.requestPermission();
                if (p === 'granted') {
                    const t = await messaging.getToken({ vapidKey: "BJcLJKf_jqJPoZxjSGFO4TjsxfDmk8Einp4e-XrruN2oIqKcMnBCmxqGuhHgRTPzItcog3eZDynrOu_76V0PqKI" });
                    await supabaseClient.from('diafon_kontrol').update({ fcm_token: t }).eq('cihaz_id', cihazId);
                    $("#fcm-durum").text("✅ FCM Aktif");
                }
            } catch(e) {}

            // Butonlar
            $("#esp-buton").click(() => supabaseGuncelle("esp_aktif", $("#esp-buton").hasClass("pasif"), "ESP8266"));
            $("#diafon-buton").click(() => supabaseGuncelle("kesici_aktif", $("#diafon-buton").hasClass("pasif"), "Diafon Kesici"));
            $("#kapi-buton").click(() => supabaseGuncelle("kapi_aktif", $("#kapi-buton").hasClass("pasif"), "Otomatik Kapı"));

            // Realtime
            supabaseClient.channel('c').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'diafon_kontrol', filter: 'cihaz_id=eq.'+cihazId }, p => {
                const n = p.new;
                if(n.son_mesaj) { $("#fcm-mesaj-icerik").text(n.son_mesaj); $("#durum-bar").text(n.son_mesaj); }
            }).subscribe();
        });
    </script>
</body>
</html>
