<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cihan Diafon Otomasyon Paneli</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging-compat.js"></script>
</head>
<body>

    <div id="panel-container">
        <h1>CİHAN DIAFON KONTROL</h1>
        <hr class="cizgi">
        <div class="buton-satir">
            <span class="buton-etiket">ESP8266 Modülü</span>
            <button id="esp-buton" class="pasif">KAPALI</button>
        </div>
        <div class="buton-satir">
            <span class="buton-etiket">Diafon Sinyal Kesici</span>
            <button id="diafon-buton" class="pasif">KAPALI</button>
        </div>
        <div class="buton-satir">
            <span class="buton-etiket">Otomatik Kapı Açıcı</span>
            <button id="kapi-buton" class="pasif">KAPALI</button>
        </div>
        <hr class="cizgi">
        <div id="fcm-mesaj-alani">
            <div id="fcm-mesaj-icerik">Bekleniyor...</div>
        </div>
        <div id="durum-bar">Sistem hazır kanka.</div>
        <div id="fcm-durum">📡 FCM Bağlanıyor...</div>
    </div>
    <div id="supabase-log-ekrani">⚡ Supabase Hazır.</div>

    <script>
        // AYARLAR
        const SUPABASE_URL = "https://tltekqwfkqaqlmmbzsmw.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_tEUn4TkI3Pc4zy8UwrqjIg_aplGStsz"; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const cihazId = "cihan_merkez_diafon";
        
        // TELEGRAM AYARLARI
        const BOT_TOKEN = "7626992520:AAH8N5F6o_mP8G-o3eT17l5zXz6x86_N31Y";
        const CHAT_ID = "6365922752";

        // Telegram Mesaj Gönder Fonksiyonu
        function telegramGonder(mesaj) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(mesaj)}`;
            fetch(url).catch(err => console.log("Telegram hatası:", err));
        }

        // --- GÖMÜLÜ SERVICE WORKER (Bunu bozmamak için buraya ekledim) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCs4s6f3bRhc8lotVWcEKSUAEH_OQFWR1g",
            authDomain: "diafon-tetik12.firebaseapp.com",
            projectId: "diafon-tetik12",
            storageBucket: "diafon-tetik12.firebasestorage.app",
            messagingSenderId: "534092717765",
            appId: "1:534092717765:web:695a90bde7071e207d1aac"
        };
        firebase.initializeApp(firebaseConfig);

        async function supabaseGuncelle(col, val, cihazAdi) {
            const durum = val ? "AÇIK" : "KAPALI";
            const mesaj = `${cihazAdi} durumu: ${durum}`;
            
            // Supabase Güncelle
            await supabaseClient.from('diafon_kontrol').update({ [col]: val, son_mesaj: mesaj }).eq('cihaz_id', cihazId);
            
            // Telegram'a Gönder
            telegramGonder("📢 " + mesaj);
            
            $("#supabase-log-ekrani").text("Supabase & Telegram: " + mesaj);
        }

        $(document).ready(function() {
            // CSS'leri buraya tekrar ekledim ki tasarımı bozulmasın
            $("body").css({ "background-color": "#0d0d0d", "color": "#ffffff", "font-family": "'Courier New', monospace", "display": "flex", "flex-direction": "column", "align-items": "center", "min-height": "100vh", "margin": "0", "padding": "20px" });
            $("#panel-container").css({ "background-color": "#1a1a1a", "padding": "30px", "border-radius": "15px", "box-shadow": "0 0 25px #00ff00", "width": "100%", "max-width": "400px", "text-align": "center" });

            // Buton Tıklamaları
            $("#esp-buton").click(() => supabaseGuncelle("esp_aktif", $("#esp-buton").hasClass("pasif"), "ESP8266"));
            $("#diafon-buton").click(() => supabaseGuncelle("kesici_aktif", $("#diafon-buton").hasClass("pasif"), "Diafon Kesici"));
            $("#kapi-buton").click(() => supabaseGuncelle("kapi_aktif", $("#kapi-buton").hasClass("pasif"), "Otomatik Kapı"));
            
            // Realtime Güncellemeleri alırken de Telegram'a düşsün mü? 
            // İstersen aşağıdaki satırla ESP'den gelen mesajları da Telegram'a yönlendirebilirsin:
            supabaseClient.channel('diafon_kontrol_channel')
            .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'diafon_kontrol', filter: 'cihaz_id=eq.' + cihazId }, payload => {
                if(payload.new.son_mesaj) {
                    // Sadece ESP'den gelen mesajları Telegram'a at (Kendi buton basışlarını zaten üstte attık)
                    if(payload.new.son_mesaj.includes("ESP")) return; 
                    telegramGonder("📩 " + payload.new.son_mesaj);
                }
            }).subscribe();
        });
    </script>
</body>
</html>
