<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cihan Diafon Otomasyon Paneli</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="panel-container">
        <h1>CİHAN DIAFON KONTROL</h1>
        <hr class="cizgi">

        <div class="buton-satir">
            <span class="buton-etiket">ESP8266 Modülü</span>
            <button id="esp-buton" class="pasif">KAPALI</button>
        </div>

        <div class="buton-satir">
            <span class="buton-etiket">Diafon Sinyal Kesici</span>
            <button id="diafon-buton" class="pasif">KAPALI</button>
        </div>

        <div class="buton-satir">
            <span class="buton-etiket">Otomatik Kapı Açıcı</span>
            <button id="kapi-buton" class="pasif">KAPALI</button>
        </div>

        <hr class="cizgi">
        
        <div id="durum-bar">Sistem hazır kanka.</div>
    </div>

    <div id="supabase-log-ekrani">
        ⚡ Supabase Canlı Veri Akışı Bekleniyor...
    </div>

    <script>
        // ==========================================
        // 🔐 SUPABASE FRANKFURT BAĞLANTI AYARLARI
        // ==========================================
    
        $(document).ready(function() {
            // ==========================================
            // 🎨 HEM MASAÜSTÜ HEM MOBİL RESPONSIVE NEON AYARLAR
            // ==========================================
            
            // Tüm sayfayı kaplayan siber ana gövde
            $("body").css({
                "background-color": "#0d0d0d",
                "color": "#ffffff",
                "font-family": "'Courier New', Courier, monospace",
                "display": "flex",
                "flex-direction": "column", // Kutular her zaman alt alta merkezlensin
                "justify-content": "center",
                "align-items": "center",
                "min-height": "100vh", // Mobilde tarayıcı barlarına çarpıp taşmayı önler
                "margin": "0",
                "padding": "20px", // Mobilde kenarlardan nefes alma payı kanka
                "box-sizing": "border-box"
            });

            // 🟢 ÜSTTEKİ ANA KONTROL KUTUSU (Yeşil Neon)
            $("#panel-container").css({
                "background-color": "#1a1a1a",
                "padding": "30px",
                "border-radius": "15px",
                "box-shadow": "0 0 25px #00ff00",
                "width": "100%", // Mobilde ekrana yapışmasın diye %100 verdik
                "max-width": "400px", // Bilgisayarda maksimum bu kadar genişlesin kanka, yayılmasın
                "text-align": "center",
                "border": "1px solid #333",
                "box-sizing": "border-box",
                "margin-bottom": "0" // Alttaki kutuyla mesafeyi flex halledecek
            });

            // 🎯 ALTAKİ SUPABASE RAPORLAMA KUTUSU (Mavi/Cyan Neon)
            $("#supabase-log-ekrani").css({
                "background-color": "#111111",
                "color": "#00fffa",
                "padding": "15px",
                "border-radius": "10px",
                "box-shadow": "0 0 20px #00fffa",
                "width": "100%", // Üstteki kutuyla aynı esneklikte
                "max-width": "400px", // PC'de üsttekiyle milimetrik eşit durur
                "margin-top": "25px", // İki kutu arasında şık bir siber boşluk
                "text-align": "center",
                "font-size": "13px",
                "font-weight": "bold",
                "border": "1px solid #222",
                "letter-spacing": "1px",
                "box-sizing": "border-box"
            });

            // Başlık Tasarımı
            $("h1").css({
                "color": "#00ff00",
                "font-size": "22px",
                "letter-spacing": "2px",
                "margin-top": "0",
                "margin-bottom": "20px",
                "text-shadow": "0 0 10px #00ff00"
            });

            // Ayırıcı Çizgiler
            $(".cizgi").css({
                "border": "0",
                "height": "1px",
                "background": "#333",
                "margin": "20px 0"
            });

            // 🎛️ Buton Satırları (Burayı esnek yaptık kanka, PC'de ve telefonda hizayı bozmaz)
            $(".buton-satir").css({
                "display": "flex",
                "justify-content": "space-between",
                "align-items": "center",
                "margin": "18px 0",
                "width": "100%"
            });

            // Buton Etiketleri (ESP8266 Modülü vs yazan yerler)
            $(".buton-etiket").css({
                "font-size": "14px",
                "color": "#cccccc",
                "font-weight": "bold",
                "text-align": "left",
                "padding-right": "10px"
            });

            // Butonların Kendisi (Genişliğini sabit değil, esnek yaptık kanka)
            $("button").css({
                "width": "100px",
                "min-width": "100px", // Mobilde yazı sığışsın diye kilitledik
                "padding": "11px 0",
                "font-size": "13px",
                "font-weight": "bold",
                "border": "none",
                "border-radius": "8px",
                "cursor": "pointer",
                "transition": "all 0.3s ease",
                "font-family": "'Courier New', Courier, monospace"
            });

            // Pasif (KAPALI) Buton Stili
            function pasifStilYap(element) {
                $(element).css({
                    "background-color": "#ff0033",
                    "color": "#ffffff",
                    "box-shadow": "0 0 12px #ff0033"
                });
            }

            // Aktif (AÇIK) Buton Stili
            function aktifStilYap(element) {
                $(element).css({
                    "background-color": "#00ff00",
                    "color": "#000000",
                    "box-shadow": "0 0 18px #00ff00"
                });
            }

            // Sayfa ilk açıldığında render alalım
            pasifStilYap("button");

            // Alt durum çubuğu
            $("#durum-bar").css({
                "font-size": "13px",
                "color": "#888888",
                "margin-top": "15px",
                "font-weight": "bold",
                "letter-spacing": "1px"
            });
    </script>
</body>
</html>
