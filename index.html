<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cihan Diafon Otomasyon Paneli</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-messaging-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #0d0d0d; color: #ffffff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        #panel-container { background-color: #1a1a1a; padding: 30px; border-radius: 15px; box-shadow: 0 0 25px #00ff00; width: 100%; max-width: 400px; text-align: center; }
        h1 { font-size: 20px; color: #00ff00; margin-bottom: 20px; }
        .cizgi { border-color: #00ff00; margin: 20px 0; }
        textarea { width: 100%; height: 60px; background: #000; color: #00ff00; border: 1px solid #00ff00; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-family: monospace; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button.aktif { background-color: #00ff00; color: #000; box-shadow: 0 0 10px #00ff00; }
        #fcm-mesaj-icerik { background: #000; padding: 15px; border-radius: 8px; border-left: 4px solid #00ff00; text-align: left; font-size: 14px; min-height: 50px; word-break: break-word; }
        #durum-bar, #fcm-durum { font-size: 11px; margin-top: 10px; color: #00ff00; }
    </style>
</head>
<body>

    <div id="panel-container">
        <h1>⚡ CİHAN VERİ İSTASYONU ⚡</h1>
        
        <!-- MESAJ GÖNDERME -->
        <textarea id="mesaj-text" placeholder="Gönderilecek veriyi yaz..."></textarea>
        <button id="gonder-btn" class="aktif">FCM VERİ GÖNDER</button>

        <hr class="cizgi">

        <!-- MESAJ ALMA -->
        <div style="font-size:12px; color:#00ff00; margin-bottom:5px;">📨 GELEN VERİ (FCM):</div>
        <div id="fcm-mesaj-icerik">🔔 Bekleniyor...</div>

        <div id="durum-bar">✅ Sistem hazır.</div>
        <div id="fcm-durum">📡 Bağlantı kontrol ediliyor...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCs4s6f3bRhc8lotVWcEKSUAEH_OQFWR1g",
            authDomain: "diafon-tetik12.firebaseapp.com",
            projectId: "diafon-tetik12",
            storageBucket: "diafon-tetik12.firebasestorage.app",
            messagingSenderId: "534092717765",
            appId: "1:534092717765:web:695a90bde7071e207d1aac"
        };
        
        firebase.initializeApp(firebaseConfig);
        const messaging = firebase.messaging();

        // 1. VERİ ALMA (FCM mesajı gelince ekrana yaz)
        messaging.onMessage((payload) => {
            const msg = payload.data?.mesaj || "Veri geldi!";
            $("#fcm-mesaj-icerik").text(msg);
            $("#durum-bar").text("📨 Yeni veri alındı.");
        });

        // 2. VERİ GÖNDERME (Butona basınca simüle et)
        $("#gonder-btn").click(function() {
            const val = $("#mesaj-text").val();
            if(!val) return;
            
            // Burası "Gönderdiğin" yer
            $("#fcm-mesaj-icerik").text(val);
            $("#durum-bar").text("📤 Veri gönderildi.");
            $("#mesaj-text").val("");
            console.log("Payload:", { data: { mesaj: val } });
        });

        // FCM Token (Sistem kurulumu)
        async function initFCM() {
            try {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    const token = await messaging.getToken({ vapidKey: "BJcLJKf_jqJPoZxjSGFO4TjsxfDmk8Einp4e-XrruN2oIqKcMnBCmxqGuhHgRTPzItcog3eZDynrOu_76V0PqKI" });
                    $("#fcm-durum").text("✅ FCM Hazır.");
                    console.log("Token:", token);
                }
            } catch(e) { $("#fcm-durum").text("❌ Hata: " + e.message); }
        }
        initFCM();
    </script>
</body>
</html>
