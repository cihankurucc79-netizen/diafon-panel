<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cihan Diafon Otomasyon Paneli</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="panel-container">
        <h1>DIAFON KONTROL PANELİ</h1>
        <hr class="cizgi">

        <div class="buton-satir">
            <span class="buton-etiket">ESP8266 Modülü</span>
            <button id="esp-buton" class="pasif" data-col="esp_aktif">KAPALI</button>
        </div>

        <div class="buton-satir">
            <span class="buton-etiket">Diafon Sinyal</span>
            <button id="diafon-buton" class="pasif" data-col="kesici_aktif">KAPALI</button>
        </div>

        <div class="buton-satir">
            <span class="buton-etiket">Otomatik Kapı</span>
            <button id="kapi-buton" class="pasif" data-col="kapi_aktif">KAPALI</button>
        </div>

        <hr class="cizgi">
        <div id="durum-bar">Sistem hazır kanka.</div>
    </div>

    <div id="supabase-log-ekrani">
        ⚡ Cihaz Bağlantısı Bekleniyor...
    </div>

    <script>
        // BAĞLANTI AYARLARI
        const SUPABASE_URL = "https://tltekqwfkqaqlmmbzsmw.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_tEUn4TkI3Pc4zy8UwrqjIg_aplGStsz"; 
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        // ÖNEMLİ: Bu değişkeni Android veya ESP'den gelen ID'ye göre dinamik yapabilirsin
        const CIHAZ_ID = "cihan_merkez_diafon"; 

        $(document).ready(function() {
            // CSS Tasarımı
            applyStyles();

            // 1. İLK VERİ ÇEKME
            fetchInitialData();

            // 2. REALTIME DİNLEYİCİ (Sadece bu cihazı izle)
            supabaseClient
                .channel('room-' + CIHAZ_ID)
                .on('postgres_changes', { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'diafon_kontrol',
                    filter: `cihaz_id=eq.${CIHAZ_ID}` 
                }, payload => {
                    updateUI(payload.new);
                })
                .subscribe();

            // BUTON KLİK OLAYLARI
            $("button").click(function() {
                const col = $(this).data("col");
                const isActive = $(this).hasClass("pasif");
                supabaseGuncelle(col, isActive);
            });
        });

        async function fetchInitialData() {
            const { data, error } = await supabaseClient
                .from('diafon_kontrol')
                .select('*')
                .eq('cihaz_id', CIHAZ_ID)
                .single();

            if (data) updateUI(data);
        }

        function updateUI(data) {
            setStyle("#esp-buton", data.esp_aktif);
            setStyle("#diafon-buton", data.kesici_aktif);
            setStyle("#kapi-buton", data.kapi_aktif);
            $("#durum-bar").text("Senkronize edildi: " + CIHAZ_ID);
        }

        function setStyle(el, active) {
            if(active) $(el).css({"background-color": "#00ff00", "color": "#000"}).text("AÇIK").removeClass("pasif").addClass("aktif");
            else $(el).css({"background-color": "#ff0033", "color": "#fff"}).text("KAPALI").removeClass("aktif").addClass("pasif");
        }

        async function supabaseGuncelle(col, val) {
            $("#supabase-log-ekrani").text("Güncelleniyor...").css("color", "#ffff00");
            const { error } = await supabaseClient
                .from('diafon_kontrol')
                .update({ [col]: val })
                .eq('cihaz_id', CIHAZ_ID);

            if (error) $("#supabase-log-ekrani").text("Hata: " + error.message).css("color", "#ff0000");
            else $("#supabase-log-ekrani").text("Başarılı!").css("color", "#00fffa");
        }

        function applyStyles() {
            $("body").css({ "background-color": "#0d0d0d", "color": "#ffffff", "font-family": "monospace", "display": "flex", "flex-direction": "column", "justify-content": "center", "align-items": "center", "min-height": "100vh", "margin": "0" });
            $("#panel-container").css({ "background-color": "#1a1a1a", "padding": "30px", "border-radius": "15px", "box-shadow": "0 0 25px #00ff00", "width": "90%", "max-width": "400px", "text-align": "center" });
            $("#supabase-log-ekrani").css({ "background-color": "#111", "color": "#00fffa", "padding": "10px", "margin-top": "20px", "border-radius": "5px", "font-size": "12px" });
            $(".buton-satir").css({ "display": "flex", "justify-content": "space-between", "align-items": "center", "margin": "15px 0" });
            $("button").css({ "width": "100px", "padding": "10px", "cursor": "pointer", "border": "none", "border-radius": "5px" });
        }
    </script>
</body>
</html>
